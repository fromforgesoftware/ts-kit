name: Release
on:
  release:
    types: [published]
  workflow_dispatch:
env:
  HUSKY: '0'
  NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: 'https://npm.pkg.github.com'
          scope: '@fromforgesoftware'
      - run: npm install --no-audit --no-fund
      - run: npm run build
      - name: Set version from release tag
        if: github.event_name == 'release'
        env:
          TAG: ${{ github.event.release.tag_name }}
        run: npm version "${TAG#v}" --no-git-tag-version --allow-same-version
      - name: Publish (idempotent) to GitHub Packages
        run: |
          set -euo pipefail
          name=$(node -p "require('./package.json').name")
          V=$(node -p "require('./package.json').version")
          if npm view "${name}@${V}" version --registry=https://npm.pkg.github.com/ >/dev/null 2>&1; then
            echo "already published ${name}@${V}"; exit 0; fi
          npm publish --access=public
